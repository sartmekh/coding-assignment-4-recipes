<h1>Waffle Recipe</h1>

<img src="../image/waffles.jpg" alt="Waffle" width="300">

<h2>Ingredients</h2>
<ul>
    <li>2 cups flour</li>
    <li>2 eggs</li>
    <li>1 1/2 cups milk</li>
    <li>1 tbsp sugar</li>
</ul>

<h2>Instructions</h2>
<ol>
    <li>Mix ingredients</li>
    <li>Pour into waffle maker</li>
    <li>Cook until golden</li>
</ol>
